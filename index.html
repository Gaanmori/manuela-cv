<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
        content="Hoja de vida de Manuela Echeverry Pineda — Gestión Operativa, Hostelería y Atención al Cliente." />

  <title>Manuela Echeverry Pineda — CV</title>

  <!--
    CSS entry point.
    Uses @import internally to load:
      tokens.css → base.css → layout.css → components/*.css
  -->
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!--
    .page: centred, max-width wrapper.
    All content is injected by main.js at runtime.
  -->
  <div class="page" role="main">

    <!-- ── HEADER ──────────────────────────────────────────── -->
    <!--
      Three-column grid: [photo+name] [spacer] [contact]
      .header__left holds photo + name; populated by main.js
    -->
    <header class="header" aria-label="Información personal">
      <div class="header__left">
        <!-- renderPhoto() + renderNameBlock() injected here -->
      </div>
      <!-- renderContact() appended directly to .header -->
    </header>

    <!-- ── QUOTE STRIP ─────────────────────────────────────── -->
    <!--
      Placeholder replaced by renderQuoteStrip() in main.js.
      Using a <div id> lets JS do replaceWith() cleanly.
    -->
    <div id="quote-slot" aria-hidden="true"></div>

    <!-- ── MAIN CONTENT GRID ───────────────────────────────── -->
    <!--
      Two-column grid: [experience main] [sidebar]
      Both columns are populated entirely by main.js.
    -->
    <div class="content-grid">

      <main class="cv-main" aria-label="Experiencia profesional">
        <!-- renderExperience() injected here -->
      </main>

      <aside class="sidebar" aria-label="Habilidades y datos personales">
        <!-- renderSkillsCard()    injected here -->
        <!-- renderLanguagesCard() injected here -->
        <!-- renderEducationCard() injected here -->
        <!-- renderProfileCard()   injected here -->
      </aside>

    </div><!-- /.content-grid -->

  </div><!-- /.page -->

  <!--
    JS entry point.
    type="module" gives us:
      · ES module scoping (no global pollution)
      · Deferred execution by default (no need for defer attr)
      · Static import graph: main → renderer, data, icons, photo
  -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
